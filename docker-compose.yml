version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped

  bot:
    build: .
    container_name: discord-radio-bot
    restart: unless-stopped

    env_file:
      - .env
    depends_on:
      - redis
    environment:
      REDIS_ADDR: ${REDIS_ADDR}