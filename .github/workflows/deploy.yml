name: CI and Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -v ./cmd/bot

  deploy:
    name: Deploy the stack
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      # The stack is three repositories checked out side by side; this one holds
      # the compose file that includes the other two. Cloning them, and putting
      # each service's .env in place, is a one-off bootstrap done by hand — see
      # README. Deploys only update what is already there: `git reset --hard`
      # leaves gitignored files alone, so the .env files survive every deploy.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_PATH="${{ secrets.APP_PATH }}"
            STACK_DIR="$(dirname "$APP_PATH")"
            AI_PATH="$STACK_DIR/DiscordAiService"
            SEARCH_PATH="$STACK_DIR/media-source-service"

            # Fail before touching anything, and say exactly what is missing.
            # Half a stack starting up is harder to diagnose than one that
            # refuses to: the bot would come up, find no AI service and report
            # connection errors that look like a network problem.
            for dir in "$APP_PATH" "$AI_PATH" "$SEARCH_PATH"; do
              if [ ! -d "$dir/.git" ]; then
                echo "MISSING REPOSITORY: $dir"
                echo "Clone it next to the others, then re-run this workflow."
                exit 1
              fi
              if [ ! -s "$dir/.env" ]; then
                echo "MISSING OR EMPTY: $dir/.env"
                echo "Each service reads its own .env from its own directory."
                echo "Copy it from .env.example and fill it in on the server;"
                echo "it is gitignored and deploys never overwrite it."
                exit 1
              fi
            done

            # cookies.txt is a *file* bind mount. When it is absent Docker
            # helpfully creates a directory in its place, and yt-dlp then fails
            # somewhere deep and unrelated-looking.
            if [ ! -f "$SEARCH_PATH/cookies.txt" ]; then
              echo "MISSING FILE: $SEARCH_PATH/cookies.txt"
              echo "Copy it to the server with LF line endings (it is gitignored)."
              exit 1
            fi

            # Each repository tracks whatever branch its origin points at —
            # they are not all on master, and hardcoding one silently deploys a
            # stale checkout of the odd one out.
            update() {
              local dir="$1"
              local branch
              branch="$(git -C "$dir" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null | sed 's|^origin/||')"
              if [ -z "$branch" ]; then
                branch="$(git -C "$dir" rev-parse --abbrev-ref HEAD)"
              fi
              echo "--- $dir @ $branch"
              git -C "$dir" fetch --prune origin
              git -C "$dir" reset --hard "origin/$branch"
            }

            update "$APP_PATH"
            update "$AI_PATH"
            update "$SEARCH_PATH"

            cd "$APP_PATH"
            docker compose up -d --build --remove-orphans
            docker compose ps
            docker image prune -f
